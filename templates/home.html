<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Student Performance Prediction</title>
	<style>
		:root {
			--bg: #f5f7fb;
			--card: #ffffff;
			--primary: #0f766e;
			--primary-dark: #115e59;
			--text: #1f2937;
			--muted: #6b7280;
			--border: #d1d5db;
			--success-bg: #ecfdf5;
			--success-text: #065f46;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--text);
			background: linear-gradient(135deg, #eef2ff 0%, #ecfeff 100%);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 24px;
		}

		.container {
			width: 100%;
			max-width: 760px;
			background: var(--card);
			border: 1px solid #e5e7eb;
			border-radius: 14px;
			box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
			padding: 28px;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 28px;
		}

		p {
			margin: 0 0 20px;
			color: var(--muted);
		}

		form {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 14px;
		}

		.field {
			display: flex;
			flex-direction: column;
			gap: 6px;
		}

		.field.full {
			grid-column: 1 / -1;
		}

		label {
			font-size: 14px;
			font-weight: 600;
		}

		select,
		input {
			width: 100%;
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 10px 12px;
			font-size: 14px;
			outline: none;
			background: #fff;
		}

		select:focus,
		input:focus {
			border-color: #14b8a6;
			box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.16);
		}

		button {
			grid-column: 1 / -1;
			border: none;
			border-radius: 10px;
			background: var(--primary);
			color: #fff;
			font-size: 15px;
			font-weight: 600;
			padding: 12px;
			cursor: pointer;
			transition: background-color 0.2s ease;
		}

		button:hover {
			background: var(--primary-dark);
		}

		.result {
			margin-top: 18px;
			padding: 12px 14px;
			border-radius: 10px;
			background: var(--success-bg);
			color: var(--success-text);
			border: 1px solid #a7f3d0;
			font-weight: 600;
		}

		@media (max-width: 700px) {
			form {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Student Exam Score Predictor</h1>
		<p>Enter student details below to predict the math score.</p>

		<form action="{{ url_for('predict_datapoint') }}" method="post">
			<div class="field">
				<label for="gender">Gender</label>
				<select id="gender" name="gender" required>
					<option value="">Select gender</option>
					<option value="male">Male</option>
					<option value="female">Female</option>
				</select>
			</div>

			<div class="field">
				<label for="ethnicity">Race or Ethnicity</label>
				<select id="ethnicity" name="ethnicity" required>
					<option value="">Select group</option>
					<option value="group A">Group A</option>
					<option value="group B">Group B</option>
					<option value="group C">Group C</option>
					<option value="group D">Group D</option>
					<option value="group E">Group E</option>
				</select>
			</div>

			<div class="field full">
				<label for="parental_level_of_education">Parental Level of Education</label>
				<select id="parental_level_of_education" name="parental_level_of_education" required>
					<option value="">Select parental education</option>
					<option value="some high school">Some high school</option>
					<option value="high school">High school</option>
					<option value="some college">Some college</option>
					<option value="associate's degree">Associate's degree</option>
					<option value="bachelor's degree">Bachelor's degree</option>
					<option value="master's degree">Master's degree</option>
				</select>
			</div>

			<div class="field">
				<label for="lunch">Lunch</label>
				<select id="lunch" name="lunch" required>
					<option value="">Select lunch type</option>
					<option value="standard">Standard</option>
					<option value="free/reduced">Free or reduced</option>
				</select>
			</div>

			<div class="field">
				<label for="test_preparation_course">Test Preparation Course</label>
				<select id="test_preparation_course" name="test_preparation_course" required>
					<option value="">Select course status</option>
					<option value="none">None</option>
					<option value="completed">Completed</option>
				</select>
			</div>

			<div class="field">
				<label for="reading_score">Reading Score</label>
				<input id="reading_score" name="reading_score" type="number" min="0" max="100" required>
			</div>

			<div class="field">
				<label for="writing_score">Writing Score</label>
				<input id="writing_score" name="writing_score" type="number" min="0" max="100" required>
			</div>

			<button type="submit">Predict Math Score</button>
		</form>

		{% if results %}
		<div class="result">
			Predicted Math Score: {{ results }}
		</div>
		{% endif %}
	</div>
</body>
</html>
